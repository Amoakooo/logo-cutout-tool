<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LOGO抠图工具</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f5f7;
      color: #17202a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      padding: 22px 28px 16px;
      border-bottom: 1px solid #d8dde3;
      background: #fff;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 0;
    }

    aside {
      padding: 20px;
      border-right: 1px solid #d8dde3;
      background: #fff;
    }

    .drop {
      display: grid;
      place-items: center;
      min-height: 160px;
      padding: 18px;
      border: 2px dashed #9aa7b4;
      border-radius: 8px;
      background: #f9fafb;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .drop.dragging {
      border-color: #1b72e8;
      background: #edf4ff;
    }

    .drop strong {
      display: block;
      margin-bottom: 8px;
      font-size: 17px;
    }

    .drop span,
    .hint,
    .status {
      color: #5d6875;
      font-size: 13px;
      line-height: 1.5;
    }

    input[type="file"] {
      display: none;
    }

    .control {
      margin-top: 20px;
    }

    label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
    }

    select {
      width: 100%;
      height: 42px;
      padding: 0 10px;
      border: 1px solid #c9d1da;
      border-radius: 8px;
      background: #fff;
      color: #17202a;
      font-size: 15px;
    }

    button {
      width: 100%;
      height: 42px;
      margin-top: 14px;
      border: 0;
      border-radius: 8px;
      background: #1b72e8;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      background: #aab3bd;
      cursor: default;
    }

    .save-link {
      display: none;
      width: 100%;
      min-height: 42px;
      margin-top: 14px;
      padding: 11px 14px;
      border-radius: 8px;
      background: #0d8f5b;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
    }

    .model-note {
      margin-top: 8px;
      color: #5d6875;
      font-size: 12px;
      line-height: 1.5;
    }

    .progress-panel {
      display: none;
      margin-top: 14px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 7px;
      color: #46515d;
      font-size: 13px;
      font-weight: 600;
    }

    progress {
      display: block;
      width: 100%;
      height: 12px;
      border: 0;
      border-radius: 6px;
      overflow: hidden;
      background: #e7ecf2;
    }

    progress::-webkit-progress-bar {
      background: #e7ecf2;
    }

    progress::-webkit-progress-value {
      background: #1b72e8;
    }

    progress::-moz-progress-bar {
      background: #1b72e8;
    }

    .secondary {
      background: #e7ecf2;
      color: #17202a;
    }

    .secondary.active {
      background: #17202a;
      color: #fff;
    }

    .preview {
      min-height: 0;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .panel {
      min-width: 0;
      min-height: 300px;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid #d8dde3;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .panel h2 {
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid #d8dde3;
      font-size: 15px;
    }

    .canvas-wrap {
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 18px;
      background:
        linear-gradient(45deg, #dfe4ea 25%, transparent 25%),
        linear-gradient(-45deg, #dfe4ea 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #dfe4ea 75%),
        linear-gradient(-45deg, transparent 75%, #dfe4ea 75%);
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      background-size: 20px 20px;
    }

    canvas {
      max-width: 100%;
      max-height: calc(100vh - 150px);
      background: transparent;
      box-shadow: 0 12px 32px rgba(20, 32, 46, .16);
    }

    canvas.pickable {
      cursor: crosshair;
    }

    @media (max-width: 820px) {
      main,
      .preview {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid #d8dde3;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>LOGO抠图工具</h1>
  </header>

  <main>
    <aside>
      <div id="drop" class="drop">
        <div>
          <strong>拖入图片或点击选择</strong>
          <span>适合白底、纯色底、浅色电商图</span>
        </div>
      </div>
      <input id="file" type="file" accept="image/*">

      <div class="control">
        <label for="tolerance">去除范围 <span id="toleranceValue">34</span></label>
        <input id="tolerance" type="range" min="5" max="120" value="34">
      </div>

      <div class="control">
        <label for="softness">边缘柔化 <span id="softnessValue">24</span></label>
        <input id="softness" type="range" min="0" max="80" value="24">
      </div>

      <div class="control">
        <label for="quality">下载画质</label>
        <select id="quality">
          <option value="1" selected>原始画质</option>
          <option value="2">AI 增强 2 倍</option>
          <option value="3">AI 增强 3 倍</option>
        </select>
        <div class="model-note">首次使用会在线加载 ESRGAN 模型，手机处理可能需要一些时间。</div>
      </div>

      <button id="enhance" class="secondary" disabled>开始 AI 增强</button>
      <div id="progressPanel" class="progress-panel">
        <div class="progress-header">
          <span id="progressStage">准备增强</span>
          <span id="progressValue">0%</span>
        </div>
        <progress id="enhanceProgress" max="100" value="0"></progress>
      </div>
      <button id="download" disabled>下载透明 PNG</button>
      <a id="saveLink" class="save-link" href="#" download="transparent.png" target="_blank" rel="noopener">打开/长按保存 PNG</a>
      <button id="pick" class="secondary" disabled>点选封闭背景</button>
      <button id="clearPicks" class="secondary" disabled>清空点选</button>
      <p id="status" class="status">等待图片</p>
      <p class="hint">当前使用边缘连通识别，会保护主体内部与背景相近的颜色。</p>
    </aside>

    <section class="preview">
      <article class="panel">
        <h2>原图</h2>
        <div class="canvas-wrap">
          <canvas id="source"></canvas>
        </div>
      </article>
      <article class="panel">
        <h2>透明 PNG 预览</h2>
        <div class="canvas-wrap">
          <canvas id="result"></canvas>
        </div>
      </article>
    </section>
  </main>

  <script>
    const drop = document.getElementById("drop");
    const fileInput = document.getElementById("file");
    const sourceCanvas = document.getElementById("source");
    const resultCanvas = document.getElementById("result");
    const tolerance = document.getElementById("tolerance");
    const softness = document.getElementById("softness");
    const toleranceValue = document.getElementById("toleranceValue");
    const softnessValue = document.getElementById("softnessValue");
    const quality = document.getElementById("quality");
    const enhance = document.getElementById("enhance");
    const progressPanel = document.getElementById("progressPanel");
    const progressStage = document.getElementById("progressStage");
    const progressValue = document.getElementById("progressValue");
    const enhanceProgress = document.getElementById("enhanceProgress");
    const download = document.getElementById("download");
    const saveLink = document.getElementById("saveLink");
    const pick = document.getElementById("pick");
    const clearPicks = document.getElementById("clearPicks");
    const status = document.getElementById("status");

    let currentImage = null;
    let currentName = "transparent.png";
    let manualSeeds = [];
    let picking = false;
    let currentPngUrl = "";
    let enhancedCanvas = null;
    let enhancedBlob = null;
    let enhancedName = "";
    let isEnhancing = false;
    const loadedScripts = new Map();
    const upscalers = new Map();
    const userAgent = navigator.userAgent || "";
    const isIPad = /iPad/i.test(userAgent) ||
      (/Macintosh/i.test(userAgent) && navigator.maxTouchPoints > 1);
    const isMobileDevice = /Android|iPhone|iPod|Mobile/i.test(userAgent) || isIPad;

    function setStatus(text) {
      status.textContent = text;
    }

    function canvasToBlob(canvas) {
      return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
    }

    function setSaveLink(blob, fileName) {
      if (currentPngUrl) URL.revokeObjectURL(currentPngUrl);
      currentPngUrl = URL.createObjectURL(blob);
      saveLink.href = currentPngUrl;
      saveLink.download = fileName;
      saveLink.style.display = isMobileDevice ? "block" : "none";
    }

    function invalidateDownload() {
      if (currentPngUrl) URL.revokeObjectURL(currentPngUrl);
      currentPngUrl = "";
      saveLink.style.display = "none";
    }

    function setProgress(percent, stage) {
      const value = Math.max(0, Math.min(100, Math.round(percent)));
      progressPanel.style.display = "block";
      enhanceProgress.value = value;
      progressValue.textContent = `${value}%`;
      progressStage.textContent = stage;
    }

    function resetEnhancement() {
      enhancedCanvas = null;
      enhancedBlob = null;
      enhancedName = "";
      invalidateDownload();
      setProgress(0, "等待增强");
      progressPanel.style.display = "none";

      const scale = Number(quality.value);
      enhance.style.display = scale === 1 ? "none" : "block";
      enhance.textContent = "开始 AI 增强";
      enhance.disabled = !currentImage || scale === 1 || isEnhancing;
      download.disabled = !currentImage || scale !== 1;
      download.textContent = scale === 1 ? "下载透明 PNG" : "增强完成后下载";
    }

    function setEnhancingState(active) {
      isEnhancing = active;
      enhance.disabled = active;
      quality.disabled = active;
      tolerance.disabled = active;
      softness.disabled = active;
      pick.disabled = active;
      clearPicks.disabled = active || manualSeeds.length === 0;
    }

    async function saveBlob(blob, fileName, width, height) {
      setSaveLink(blob, fileName);

      const file = new File([blob], fileName, { type: "image/png" });
      if (
        isMobileDevice &&
        navigator.canShare &&
        navigator.canShare({ files: [file] }) &&
        navigator.share
      ) {
        try {
          await navigator.share({ files: [file], title: "透明 PNG" });
          setStatus(`已生成 ${width} × ${height} PNG`);
          return;
        } catch (error) {
          setStatus("分享面板已关闭，可点绿色按钮打开或长按保存");
        }
      }

      const link = document.createElement("a");
      link.download = fileName;
      link.href = currentPngUrl;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setStatus(isMobileDevice
        ? `已生成 ${width} × ${height}；如未下载请点绿色按钮`
        : `已开始下载 ${width} × ${height} PNG`);
    }

    function loadScript(url) {
      if (loadedScripts.has(url)) return loadedScripts.get(url);
      const promise = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = url;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`无法加载 ${url}`));
        document.head.appendChild(script);
      });
      loadedScripts.set(url, promise);
      return promise;
    }

    async function getUpscaler(scale) {
      if (upscalers.has(scale)) return upscalers.get(scale);

      setProgress(3, "加载 AI 运行环境");
      await loadScript("https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js");
      setProgress(7, "加载 ESRGAN 模型");
      await loadScript(`https://cdn.jsdelivr.net/npm/@upscalerjs/esrgan-slim@latest/dist/umd/${scale}x.min.js`);
      setProgress(10, "初始化 AI 模型");
      await loadScript("https://cdn.jsdelivr.net/npm/upscaler@latest/dist/browser/umd/upscaler.min.js");

      const model = scale === 2 ? window.ESRGANSlim2x : window.ESRGANSlim3x;
      if (!window.Upscaler || !model) throw new Error("AI 增强模型初始化失败");

      const upscaler = new window.Upscaler({ model });
      upscalers.set(scale, upscaler);
      return upscaler;
    }

    function imageFromSource(source) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error("AI 增强结果读取失败"));
        image.src = source;
      });
    }

    function restoreTransparency(exportCanvas) {
      const alphaCanvas = document.createElement("canvas");
      alphaCanvas.width = resultCanvas.width;
      alphaCanvas.height = resultCanvas.height;
      const alphaContext = alphaCanvas.getContext("2d");
      const source = resultCanvas.getContext("2d").getImageData(0, 0, resultCanvas.width, resultCanvas.height);
      const alpha = alphaContext.createImageData(resultCanvas.width, resultCanvas.height);

      for (let index = 0; index < source.data.length; index += 4) {
        alpha.data[index] = 255;
        alpha.data[index + 1] = 255;
        alpha.data[index + 2] = 255;
        alpha.data[index + 3] = source.data[index + 3];
      }

      alphaContext.putImageData(alpha, 0, 0);
      const exportContext = exportCanvas.getContext("2d");
      exportContext.globalCompositeOperation = "destination-in";
      exportContext.imageSmoothingEnabled = true;
      exportContext.imageSmoothingQuality = "high";
      exportContext.drawImage(alphaCanvas, 0, 0, exportCanvas.width, exportCanvas.height);
      exportContext.globalCompositeOperation = "source-over";
    }

    async function buildExportCanvas() {
      const scale = Number(quality.value);
      if (scale === 1) return resultCanvas;

      const upscaler = await getUpscaler(scale);
      const maxInputSide = isMobileDevice
        ? (scale === 3 ? 640 : 900)
        : (scale === 3 ? 1100 : 1500);
      const inputScale = Math.min(1, maxInputSide / Math.max(resultCanvas.width, resultCanvas.height));
      const aiInput = document.createElement("canvas");
      aiInput.width = Math.max(1, Math.round(resultCanvas.width * inputScale));
      aiInput.height = Math.max(1, Math.round(resultCanvas.height * inputScale));
      const aiInputContext = aiInput.getContext("2d");
      aiInputContext.fillStyle = "#ffffff";
      aiInputContext.fillRect(0, 0, aiInput.width, aiInput.height);
      aiInputContext.imageSmoothingEnabled = true;
      aiInputContext.imageSmoothingQuality = "high";
      aiInputContext.drawImage(resultCanvas, 0, 0, aiInput.width, aiInput.height);

      const enhancedSource = await upscaler.upscale(aiInput, {
        patchSize: isMobileDevice ? 48 : 64,
        padding: 4,
        awaitNextFrame: true,
        progress: progress => {
          const normalized = progress > 1 ? progress / 100 : progress;
          setProgress(10 + normalized * 82, "AI 正在增强画质");
        }
      });
      setProgress(93, "合成增强结果");
      const enhancedImage = await imageFromSource(enhancedSource);
      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = enhancedImage.naturalWidth;
      exportCanvas.height = enhancedImage.naturalHeight;
      exportCanvas.getContext("2d").drawImage(enhancedImage, 0, 0);
      restoreTransparency(exportCanvas);
      setProgress(96, "恢复透明背景");
      return exportCanvas;
    }

    function getExportName() {
      const scale = Number(quality.value);
      if (scale === 1) return currentName;
      return currentName.replace(/\.png$/i, `_enhanced_${scale}x.png`);
    }

    function fitCanvas(canvas, image) {
      const maxSide = 1800;
      const scale = Math.min(1, maxSide / Math.max(image.naturalWidth, image.naturalHeight));
      canvas.width = Math.round(image.naturalWidth * scale);
      canvas.height = Math.round(image.naturalHeight * scale);
    }

    function distance(red, green, blue, bgRed, bgGreen, bgBlue) {
      return Math.sqrt(
        (red - bgRed) ** 2 +
        (green - bgGreen) ** 2 +
        (blue - bgBlue) ** 2
      );
    }

    function sampleBackground(data, width, height) {
      const points = [
        [0, 0],
        [width - 1, 0],
        [0, height - 1],
        [width - 1, height - 1],
        [Math.floor(width / 2), 0],
        [Math.floor(width / 2), height - 1],
        [0, Math.floor(height / 2)],
        [width - 1, Math.floor(height / 2)]
      ];
      const color = [0, 0, 0];
      for (const [x, y] of points) {
        const index = (y * width + x) * 4;
        color[0] += data[index];
        color[1] += data[index + 1];
        color[2] += data[index + 2];
      }
      return color.map(value => value / points.length);
    }

    function findConnectedBackground(data, width, height, limit, seedColor = null, seedPoints = null) {
      const [bgRed, bgGreen, bgBlue] = seedColor || sampleBackground(data, width, height);
      const total = width * height;
      const visited = new Uint8Array(total);
      const background = new Uint8Array(total);
      const queue = [];

      function canRemove(pixelIndex) {
        const dataIndex = pixelIndex * 4;
        return distance(
          data[dataIndex],
          data[dataIndex + 1],
          data[dataIndex + 2],
          bgRed,
          bgGreen,
          bgBlue
        ) <= limit;
      }

      function pushIfBackground(x, y) {
        if (x < 0 || y < 0 || x >= width || y >= height) return;
        const pixelIndex = y * width + x;
        if (visited[pixelIndex] || !canRemove(pixelIndex)) return;
        visited[pixelIndex] = 1;
        background[pixelIndex] = 1;
        queue.push(pixelIndex);
      }

      if (seedPoints) {
        for (const point of seedPoints) {
          pushIfBackground(point.x, point.y);
        }
      } else {
        for (let x = 0; x < width; x += 1) {
          pushIfBackground(x, 0);
          pushIfBackground(x, height - 1);
        }
        for (let y = 0; y < height; y += 1) {
          pushIfBackground(0, y);
          pushIfBackground(width - 1, y);
        }
      }

      for (let cursor = 0; cursor < queue.length; cursor += 1) {
        const pixelIndex = queue[cursor];
        const x = pixelIndex % width;
        const y = Math.floor(pixelIndex / width);
        pushIfBackground(x + 1, y);
        pushIfBackground(x - 1, y);
        pushIfBackground(x, y + 1);
        pushIfBackground(x, y - 1);
      }

      return background;
    }

    function pickSeedMask(data, width, height, seed, limit) {
      const x = Math.max(0, Math.min(width - 1, Math.round(seed.x)));
      const y = Math.max(0, Math.min(height - 1, Math.round(seed.y)));
      const dataIndex = (y * width + x) * 4;
      const seedColor = [data[dataIndex], data[dataIndex + 1], data[dataIndex + 2]];
      return findConnectedBackground(data, width, height, limit, seedColor, [{ x, y }]);
    }

    function softenEdges(data, width, height, background, feather) {
      if (feather <= 0) return;
      const originalAlpha = new Uint8ClampedArray(width * height);

      for (let pixelIndex = 0; pixelIndex < background.length; pixelIndex += 1) {
        originalAlpha[pixelIndex] = data[pixelIndex * 4 + 3];
      }

      for (let pixelIndex = 0; pixelIndex < background.length; pixelIndex += 1) {
        if (background[pixelIndex]) continue;

        const x = pixelIndex % width;
        const y = Math.floor(pixelIndex / width);
        let touchesBackground = false;

        for (let offsetY = -1; offsetY <= 1; offsetY += 1) {
          for (let offsetX = -1; offsetX <= 1; offsetX += 1) {
            if (offsetX === 0 && offsetY === 0) continue;
            const nextX = x + offsetX;
            const nextY = y + offsetY;
            if (nextX < 0 || nextY < 0 || nextX >= width || nextY >= height) continue;
            if (background[nextY * width + nextX]) touchesBackground = true;
          }
        }

        if (touchesBackground) {
          data[pixelIndex * 4 + 3] = Math.min(originalAlpha[pixelIndex], 255 - feather);
        }
      }
    }

    function render() {
      if (!currentImage) return;

      toleranceValue.textContent = tolerance.value;
      softnessValue.textContent = softness.value;

      fitCanvas(sourceCanvas, currentImage);
      fitCanvas(resultCanvas, currentImage);

      const sourceCtx = sourceCanvas.getContext("2d");
      const resultCtx = resultCanvas.getContext("2d");
      sourceCtx.clearRect(0, 0, sourceCanvas.width, sourceCanvas.height);
      resultCtx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
      sourceCtx.drawImage(currentImage, 0, 0, sourceCanvas.width, sourceCanvas.height);
      resultCtx.drawImage(currentImage, 0, 0, resultCanvas.width, resultCanvas.height);

      const image = resultCtx.getImageData(0, 0, resultCanvas.width, resultCanvas.height);
      const limit = Number(tolerance.value);
      const feather = Number(softness.value);
      const background = findConnectedBackground(image.data, image.width, image.height, limit);

      for (const seed of manualSeeds) {
        const seedMask = pickSeedMask(image.data, image.width, image.height, seed, limit);
        for (let pixelIndex = 0; pixelIndex < background.length; pixelIndex += 1) {
          if (seedMask[pixelIndex]) background[pixelIndex] = 1;
        }
      }

      for (let pixelIndex = 0; pixelIndex < background.length; pixelIndex += 1) {
        if (background[pixelIndex]) image.data[pixelIndex * 4 + 3] = 0;
      }

      softenEdges(image.data, image.width, image.height, background, feather);

      resultCtx.putImageData(image, 0, 0);
      pick.disabled = false;
      clearPicks.disabled = manualSeeds.length === 0;
      resetEnhancement();
      const scale = Number(quality.value);
      const readyText = scale === 1 ? "可以直接下载" : `可以开始 AI ${scale} 倍增强`;
      setStatus(manualSeeds.length
        ? `处理完成，已点选 ${manualSeeds.length} 处；${readyText}`
        : `抠图完成，${readyText}`);
    }

    function openFile(file) {
      if (isEnhancing) {
        setStatus("AI 增强进行中，请等待当前任务完成");
        return;
      }
      if (!file || !file.type.startsWith("image/")) {
        setStatus("请选择图片文件");
        return;
      }

      const image = new Image();
      image.onload = () => {
        URL.revokeObjectURL(image.src);
        currentImage = image;
        currentName = file.name.replace(/\.[^.]+$/, "") + "_transparent.png";
        manualSeeds = [];
        render();
      };
      image.src = URL.createObjectURL(file);
      setStatus("正在读取图片...");
    }

    drop.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", event => openFile(event.target.files[0]));

    for (const eventName of ["dragenter", "dragover"]) {
      drop.addEventListener(eventName, event => {
        event.preventDefault();
        drop.classList.add("dragging");
      });
    }

    for (const eventName of ["dragleave", "drop"]) {
      drop.addEventListener(eventName, event => {
        event.preventDefault();
        drop.classList.remove("dragging");
      });
    }

    drop.addEventListener("drop", event => openFile(event.dataTransfer.files[0]));
    tolerance.addEventListener("input", render);
    softness.addEventListener("input", render);
    quality.addEventListener("change", () => {
      resetEnhancement();
      const scale = Number(quality.value);
      setStatus(scale === 1 ? "已选择原始画质，可以直接下载" : `已选择 AI ${scale} 倍增强，请先开始增强`);
    });

    pick.addEventListener("click", () => {
      if (!currentImage) return;
      picking = !picking;
      pick.classList.toggle("active", picking);
      sourceCanvas.classList.toggle("pickable", picking);
      resultCanvas.classList.toggle("pickable", picking);
      setStatus(picking ? "在原图或预览图上点击要清除的封闭背景" : "点选已关闭");
    });

    clearPicks.addEventListener("click", () => {
      manualSeeds = [];
      clearPicks.disabled = true;
      render();
    });

    function addSeedFromCanvas(event, canvas) {
      if (!picking || !currentImage) return;
      const rect = canvas.getBoundingClientRect();
      const x = (event.clientX - rect.left) * canvas.width / rect.width;
      const y = (event.clientY - rect.top) * canvas.height / rect.height;
      manualSeeds.push({ x, y });
      render();
    }

    sourceCanvas.addEventListener("click", event => addSeedFromCanvas(event, sourceCanvas));
    resultCanvas.addEventListener("click", event => addSeedFromCanvas(event, resultCanvas));

    enhance.addEventListener("click", async () => {
      if (!currentImage || isEnhancing || Number(quality.value) === 1) return;

      resetEnhancement();
      setEnhancingState(true);
      setProgress(1, "准备 AI 增强");
      setStatus("AI 增强正在后台运算，请保持页面打开");
      await new Promise(resolve => setTimeout(resolve, 30));

      try {
        enhancedCanvas = await buildExportCanvas();
        setProgress(98, "生成透明 PNG");
        enhancedBlob = await canvasToBlob(enhancedCanvas);
        if (!enhancedBlob) throw new Error("生成 PNG 失败");
        enhancedName = getExportName();
        setProgress(100, "AI 增强完成");
        download.disabled = false;
        download.textContent = "下载增强 PNG";
        enhance.textContent = "重新增强";
        setStatus(`增强完成：${enhancedCanvas.width} × ${enhancedCanvas.height}，可以下载`);
      } catch (error) {
        enhancedCanvas = null;
        enhancedBlob = null;
        enhancedName = "";
        setProgress(0, "增强失败");
        setStatus("AI 增强失败，请检查网络或改用原始画质");
      } finally {
        setEnhancingState(false);
        enhance.disabled = !currentImage || Number(quality.value) === 1;
      }
    });

    download.addEventListener("click", async () => {
      if (!currentImage || isEnhancing) return;

      const scale = Number(quality.value);
      if (scale === 1) {
        download.disabled = true;
        setStatus("正在生成 PNG...");
        const blob = await canvasToBlob(resultCanvas);
        download.disabled = false;
        if (!blob) {
          setStatus("生成 PNG 失败，请换一张图片再试");
          return;
        }
        await saveBlob(blob, currentName, resultCanvas.width, resultCanvas.height);
        return;
      }

      if (!enhancedCanvas || !enhancedBlob) {
        setStatus("请先点击“开始 AI 增强”并等待完成");
        return;
      }

      await saveBlob(
        enhancedBlob,
        enhancedName,
        enhancedCanvas.width,
        enhancedCanvas.height
      );
    });

    resetEnhancement();
  </script>
</body>
</html>
